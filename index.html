<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Fuel Inventory | National Foam</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="wrap">

    <!-- Header -->
    <header class="header">
      <div class="headerLeft">
        <h1><span class="nf">NF</span> Fuel Inventory</h1>
        <div class="meta">
          <span>Sync:</span>
          <span id="projectLabel" class="pill">Not set</span>
          <button id="btnSetProject" class="linkbtn" type="button">Change</button>
        </div>
      </div>
      <div class="headerRight">
        <button id="btnAddContainer" class="btn primary" type="button">+ Add</button>
        <button id="btnManageFuels" class="btn ghost" type="button">Fuel Types</button>
        <button id="btnExportCsv" class="btn ghost" type="button">Export CSV</button>
      </div>
    </header>

    <!-- Status Bar -->
    <div id="statusBar" class="statusBar" data-error="0">
      <div class="statusBarInner">
        <div class="statusLeft">
          <span class="statusDot"></span>
          <span id="status" class="statusText">Loading…</span>
        </div>
        <div class="statusRight">
          <span id="emptyTally" class="tally"></span>
          <span class="pill">V10</span>
        </div>
      </div>
    </div>

    <!-- Container Tables -->
    <div id="inventoryRoot" class="inventoryRoot"></div>

    <!-- Empty Drum Log -->
    <div id="emptiesRoot" class="inventoryRoot" style="margin-top:8px;"></div>

  </main>

  <!-- Add Container Popup -->
  <dialog id="addDialog" class="dialog">
    <div class="dialogCard">
      <div class="dialogHeader">
        <div class="dialogFuelName">Add Drums</div>
        <button id="addDialogClose" class="iconBtn" type="button" aria-label="Close">✕</button>
      </div>

      <div class="field">
        <div class="lbl">Container</div>
        <input id="newContainer" type="text" placeholder="e.g. Cage A, Shed 1" autocomplete="off" />
      </div>

      <div class="field">
        <div class="lbl">Fuel Type</div>
        <select id="newFuelType">
          <option value="" selected disabled>Select fuel</option>
        </select>
      </div>

      <div class="field">
        <div class="lbl">Drums to Add</div>
        <input id="newDrums" type="text" inputmode="numeric" placeholder="1" value="1" />
      </div>

      <div class="dialogBtns">
        <button id="addCancelBtn" class="btn ghost" type="button">Cancel</button>
        <button id="addConfirmBtn" class="btn primary" type="button">+ Add</button>
      </div>
    </div>
  </dialog>

  <!-- Use Fuel Popup -->
  <dialog id="useDialog" class="dialog">
    <div class="dialogCard">
      <div class="dialogHeader">
        <div>
          <div id="useDialogFuel" class="dialogFuelName"></div>
          <div id="useDialogContainer" class="dialogContainerName"></div>
        </div>
        <button id="useDialogClose" class="iconBtn" type="button" aria-label="Close">✕</button>
      </div>

      <div class="useStats">
        <div class="useStat">
          <div class="useStatVal" id="useStatDrums">—</div>
          <div class="useStatLbl">Drums</div>
        </div>
        <div class="useStatDivider"></div>
        <div class="useStat">
          <div class="useStatVal" id="useStatGals">—</div>
          <div class="useStatLbl">Gal remaining</div>
        </div>
      </div>

      <div class="field">
        <div class="lbl">Gallons Used</div>
        <input id="useAmount" type="text" inputmode="decimal"
               pattern="[0-9]*[.]?[0-9]*"
               placeholder="0"
               autocomplete="off" />
      </div>

      <div id="usePreview" class="usePreview"></div>

      <div class="dialogBtns">
        <button id="useCancelBtn" class="btn ghost" type="button">Cancel</button>
        <button id="useConfirmBtn" class="btn primary" type="button">Subtract</button>
      </div>
    </div>
  </dialog>

  <!-- Edit Container Dialog -->
  <dialog id="editDialog" class="dialog editDialogEl">
    <div class="dialogCard editDialogCard">
      <div class="dialogHeader">
        <div>
          <div class="lbl" style="margin-bottom:2px">Editing Container</div>
          <div id="editDialogTitle" class="dialogFuelName"></div>
        </div>
        <button id="editDialogClose" class="iconBtn" type="button" aria-label="Close">✕</button>
      </div>

      <div id="editDialogBody" class="editDialogBody"></div>

      <div class="dialogBtns">
        <button id="editCancelBtn" class="btn ghost" type="button">Cancel</button>
        <button id="editSaveBtn" class="btn primary" type="button">Save All</button>
      </div>
    </div>
  </dialog>

  <!-- Manage Fuel Types Dialog -->
  <dialog id="fuelDialog" class="dialog">
    <div class="dialogCard">
      <div class="dialogHeader">
        <div class="dialogFuelName">Fuel Types</div>
        <button id="fuelDialogClose" class="iconBtn" type="button" aria-label="Close">✕</button>
      </div>

      <div id="fuelDialogList" class="fuelTypeList"></div>

      <div class="fuelAddRow">
        <input id="fuelNewInput" type="text" placeholder="New fuel type…" autocomplete="off" />
        <button id="fuelAddBtn" class="btn primary" type="button">Add</button>
      </div>

      <div class="dialogBtns" style="margin-top:4px;">
        <button id="fuelDoneBtn" class="btn primary" style="width:100%" type="button">Done</button>
      </div>
    </div>
  </dialog>

  <!-- Sync Name Dialog -->
  <dialog id="syncDialog" class="dialog">
    <div class="dialogCard">
      <h2>Set Sync Name</h2>
      <p>Use the same name on every device to share inventory.</p>
      <input id="syncNameInput" type="text" placeholder="e.g. NF-FuelYard" autocomplete="off" />
      <div class="dialogBtns">
        <button id="syncCancel" class="btn ghost" type="button">Cancel</button>
        <button id="syncSave" class="btn primary" type="button">Save</button>
      </div>
    </div>
  </dialog>

  <script defer src="script.js?v=v10"></script>
</body>
</html>
